<header class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <img src="assets/images/logo.svg" alt="Logo" class="logo navbar-brand" />

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNavAltMarkup"
      aria-controls="navbarNavAltMarkup"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav ms-auto">
        @if (isLoggedIn()) {
          <a class="nav-link" routerLink="/dashboard">Inicio</a>
          <div class="dropdown">
            <button class="user-dropdown-btn" data-bs-toggle="dropdown">
              <div class="user-avatar">{{ getUserInitials() }}</div>
              <span class="user-name">{{ getUserName() }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><span class="dropdown-item-text text-muted small">{{ getUserRole() }}</span></li>
              <li><hr class="dropdown-divider"></li>
              <li><button class="dropdown-item" (click)="logout()">Cerrar sesión</button></li>
            </ul>
          </div>
        }
      </div>
    </div>

  </div>
</header>

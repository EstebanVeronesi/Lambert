<div class="page-container container">
  <app-breadcrumb [items]="[{label: 'Inicio', link: '/dashboard'}, {label: 'Nueva simulación'}]"></app-breadcrumb>

  <div class="form-wrapper">

    <div class="stepper">
      <div class="stepper-step" [class.active]="paso === 1" [class.completed]="paso > 1">
        <div class="stepper-circle">{{ paso > 1 ? '✓' : '1' }}</div>
        <span class="stepper-label">Camión</span>
      </div>
      <div class="stepper-step" [class.active]="paso === 2" [class.completed]="paso > 2">
        <div class="stepper-circle">{{ paso > 2 ? '✓' : '2' }}</div>
        <span class="stepper-label">Configuración</span>
      </div>
      <div class="stepper-step" [class.active]="paso === 3" [class.completed]="paso > 3">
        <div class="stepper-circle">{{ paso > 3 ? '✓' : '3' }}</div>
        <span class="stepper-label">Resultados</span>
      </div>
      <div class="stepper-step" [class.active]="paso === 4">
        <div class="stepper-circle">4</div>
        <span class="stepper-label">Cliente</span>
      </div>
    </div>

    <div *ngIf="errorConfiguracion" class="feedback-message feedback-error mb-3">
      ⚠ {{ errorConfiguracion }}
    </div>

    <app-paso1-camion
      *ngIf="paso === 1"
      (siguiente)="irAlPaso(2)"
      (camionSeleccionado)="recibirCamion($event)">
    </app-paso1-camion>

    <app-paso2-configuracion
      *ngIf="paso === 2"
      [datosGuardados]="datosConfiguracion"
      [modoLectura]="modoLectura"
      (configuracionGuardada)="recibirConfiguracion($event)"
      (siguiente)="irAlPaso(3)"
      (anterior)="irAlPaso(1)">
    </app-paso2-configuracion>

    <app-paso3-resultados
      *ngIf="paso === 3"
      [datosProyecto]="armarDatosProyecto()"
      (modificar)="volverAModificar()"
      (guardar)="guardarProyecto($event)"
      (siguiente)="irAlPaso(4)">
    </app-paso3-resultados>

    <app-paso4-cliente
      *ngIf="paso === 4 && datosProyecto"
      [datosProyecto]="datosProyecto"
      [resultados]="resultadosSimulacion"
      [esModificado]="esModificado">
    </app-paso4-cliente>

  </div>
</div>
